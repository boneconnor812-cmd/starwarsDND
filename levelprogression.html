/* Level cards styled to match site */
.level-card {
  border: 1px solid #d2d2d7;
  padding: 16px;
  margin: 12px 0;
  border-radius: 14px;
  background: #f5f5f7;
  color: #1d1d1f;
  opacity: 0;
  transform: scale(0.95);
}

/* Animation */
@keyframes popIn {
  from { opacity: 0; transform: scale(0.9); }
  to { opacity: 1; transform: scale(1); }
}

.level-card.show {
  animation: popIn 0.3s ease forwards;
}

/* Effect badge */
.effect {

  font-weight: 600;

}

function loadLevels() {
  const selectedClass = document.getElementById('classSelect').value;
  const maxLevel = document.getElementById('levelSelect').value;

  const container = document.getElementById('levelsContainer');
  container.innerHTML = '';

  for (let i = 1; i <= maxLevel; i++) {
    const div = document.createElement('div');
    div.classList.add('level-card');

    let content = `<h3>Level ${i}</h3>`;

    const levelData = data[selectedClass][i];

    if (levelData) {
      levelData.forEach(item => {
        content += `
<div style="margin-bottom:10px;">
  <strong>${item.type}: ${item.name}</strong> 
  <span class="effect">${item.effect || ''}</span>
  <p style="margin-top:6px;">${item.desc}</p>
</div>
`;

      });
    } else {
      content += `<p>No abilities yet.</p>`;
    }

    div.innerHTML = content;
    container.appendChild(div);

    // 👇 animation
    setTimeout(() => {
      div.classList.add('show');
    }, i * 100);
  }
}
``

document.getElementById('levelSelect').addEventListener('change', (e) => {
  loadLevels(e.target.value);
});

document.getElementById('classSelect').addEventListener('change', loadLevels);
document.getElementById('levelSelect').addEventListener('change', loadLevels);

// initial load
loadLevels(1);
</script>
