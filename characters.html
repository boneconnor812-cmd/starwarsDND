<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Supabase Demo</title>
</head>
<body>
<form id="character-form">
  <input id="character-name" type="text" placeholder="Character name" required />
  <input id="race" type="text" placeholder="Race" required />
  <input id="class" type="text" placeholder="Class" required />
  <input id="irl-name" type="text" placeholder="IRL name" required />
  <button type="submit">Add Character</button>
</form>

<table>
  <thead>
    <tr>
      <th>Character Name</th>
      <th>Race</th>
      <th>Class</th>
      <th>IRL Name</th>
    </tr>
  </thead>
  <tbody id="characters-table-body"></tbody>
</table>

<!-- Supabase JS client -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<!-- Your app logic -->
<script src="app.js"></script>
</body>
</html>
